# Perfil `test`: BD en memoria para smoke test de contexto (mvn test sin MySQL).
spring.datasource.url=jdbc:h2:mem:pokemon_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
jwt.secret.key=TEST_JWT_SECRET_KEY_AT_LEAST_256_BITS_FOR_HS256_ALGORITHM_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
