spring.application.name=pokemon-backend

# ----------------------------------------
# Conexión a MySQL (usuario/contraseña/JWT: env o application-local.properties)
# ----------------------------------------
server.port=${SERVER_PORT:8081}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pokemon_web_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------
# Configuración JPA/Hibernate
# ----------------------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# ----------------------------------------
# Clave Secreta JWT (sobreescribir en producción con variable de entorno)
# ----------------------------------------
jwt.secret.key=${JWT_SECRET}

# OpenAPI / Swagger UI 
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator: solo health sin auth (orquestación / monitor básico)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Último: sobrescribe usuario/contraseña/JWT sin versionar (ver application-local.properties.example).
spring.config.import=optional:classpath:application-local.properties
